<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天截图生成器 - 全功能旗舰版 (V8)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        /* 强制覆盖字体，优先使用苹果原生苹方字体 */
        body {
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", Helvetica, "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f3f4f6;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* 气泡小尾巴 */
        .bubble-tail::before {
            content: ''; position: absolute; top: 13px; width: 8px; height: 8px;
            transform: rotate(45deg); border-radius: 1px; z-index: 0;
        }
        
        .bubble-left-dark::before { left: -3.5px; background-color: #2c2c2c; }
        .bubble-right-dark::before { right: -3.5px; background-color: #27c24c; }
        .bubble-left-orange-pending::before { left: -3.5px; background-color: #f29c38; }
        .bubble-right-orange-pending::before { right: -3.5px; background-color: #f29c38; }
        .bubble-left-orange-accepted::before { left: -3.5px; background-color: #b37327; }
        .bubble-right-orange-accepted::before { right: -3.5px; background-color: #b37327; }
        
        .text-bubble {
            font-size: 16px; line-height: 22px; padding: 9px 12px;
            max-width: 250px; border-radius: 6px;
            word-wrap: break-word; white-space: pre-wrap;
            position: relative; z-index: 10;
        }

        .finance-bubble {
            width: 218px; border-radius: 6px; position: relative; z-index: 10;
        }

        /* V8 新增: 图片气泡宽度限制，确保不超过屏幕的一半 */
        .image-bubble {
            max-width: 130px; /* 约占屏幕宽度 375px 的 34% */
            max-height: 220px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            z-index: 10;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .wechat-dark-bg { background-color: #111111; }
        .wechat-dark-left { background-color: #2c2c2c; color: #e5e5e5; }
        .wechat-dark-right { background-color: #27c24c; color: #000000; }
        .transfer-pending { background-color: #f29c38; color: #ffffff; }
        .transfer-accepted { background-color: #b37327; color: rgba(255, 255, 255, 0.65); }

        /* 拖拽相关样式 */
        .draggable-item { cursor: grab; transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s; }
        .draggable-item:active { cursor: grabbing; }
        .is-dragging { opacity: 0.4; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(1.02); z-index: 50; }
        .drag-over { border-top: 3px solid #3b82f6 !important; padding-top: 13px !important; }

        /* 列表动画 */
        .msg-list-move, .msg-list-enter-active, .msg-list-leave-active { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .msg-list-enter-from, .msg-list-leave-to { opacity: 0; transform: translateY(15px); }
        .msg-list-leave-active { position: absolute; width: 100%; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen flex flex-col md:flex-row max-w-[1400px] mx-auto p-4 md:p-8 gap-8">
    
    <div class="w-full md:w-[480px] bg-white rounded-xl shadow-lg flex flex-col h-[calc(100vh-4rem)] overflow-hidden">
        
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white z-20 shrink-0">
            <h1 class="text-xl font-bold text-gray-800">微信截图编辑器 V8</h1>
            <button @click="generateImage" class="bg-[#27c24c] hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                导出截图
            </button>
        </div>

        <div id="edit-panel-scroll" class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 space-y-6 relative">
            
            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h2 class="font-semibold text-gray-700">顶部状态栏设置</h2>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">手机时间</label>
                        <input v-model="statusBarTime" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">左上角返回</label>
                        <input v-model="returnAppText" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="留空隐藏">
                    </div>
                </div>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">聊天标题</label>
                        <input v-model="chatName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">未读消息数</label>
                        <input v-model="unreadCount" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="如: 92">
                    </div>
                </div>
            </div>

            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold text-gray-700">人物设置</h2>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" v-model="showOtherName" class="rounded text-green-600 w-4 h-4">
                        气泡上方显示昵称
                    </label>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">对方昵称</label>
                    <input v-model="otherName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="flex gap-6 mt-2">
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">我的头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="myAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'me')">
                        </label>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">对方头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="otherAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'other')">
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4 pb-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                        聊天内容编排 
                        <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full">长按模块可拖拽排序</span>
                    </h2>
                </div>
                
                <transition-group name="msg-list" tag="div" class="space-y-4 relative w-full">
                    <div v-for="(msg, index) in messages" :key="msg.id" 
                         draggable="true"
                         @dragstart="onDragStart($event, index)"
                         @dragover.prevent="onDragOver($event, index)"
                         @dragenter.prevent="onDragEnter(index)"
                         @dragleave.prevent="onDragLeave(index)"
                         @drop="onDrop($event, index)"
                         @dragend="onDragEnd"
                         class="draggable-item bg-gray-50 p-4 rounded-lg border border-gray-200 relative group hover:border-gray-400 w-full"
                         :class="{ 'is-dragging': dragIndex === index, 'drag-over': dragOverIndex === index }">
                        
                        <div class="absolute left-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-30 transition cursor-grab text-gray-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </div>
                        <button @click.stop="removeMessage(index)" class="absolute -right-2 -top-2 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition shadow-md flex items-center justify-center text-sm z-10 hover:bg-red-600">×</button>
                        
                        <div class="pl-3">
                            <div v-if="msg.type === 'time'">
                                <label class="block text-xs text-gray-500 mb-1">对话时间</label>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm text-center focus:ring-2 focus:ring-green-500 outline-none">
                            </div>

                            <div v-if="msg.type === 'nudge'">
                                <label class="block text-xs text-purple-600 font-medium mb-1">系统提示 (居中灰字)</label>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm text-center focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            
                            <div v-if="msg.type === 'text'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label>文本内容</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop>
                                        <input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的
                                    </label>
                                </div>
                                <textarea v-model="msg.content" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                            </div>

                            <div v-if="msg.type === 'image'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-indigo-600 font-medium">图片消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop>
                                        <input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的
                                    </label>
                                </div>
                                <div class="mt-2 flex items-center gap-4">
                                    <img :src="msg.imageUrl" class="w-16 h-16 object-cover rounded border border-gray-300">
                                    <label class="bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded cursor-pointer text-sm transition" @mousedown.stop>
                                        点击上传图片
                                        <input type="file" class="hidden" accept="image/*" @change="e => onMsgImageUpload(e, msg)">
                                    </label>
                                </div>
                            </div>

                            <div v-if="msg.type === 'voice'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-pink-600 font-medium">语音消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop>
                                        <input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的
                                    </label>
                                </div>
                                <div class="flex gap-2 mt-2 mb-2">
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">时长(秒)</label>
                                        <input v-model.number="msg.duration" type="number" min="1" max="60" class="w-full px-3 py-1.5 border rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">语音状态</label>
                                        <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                            <option value="unread">未读 (红点)</option>
                                            <option value="read">已读</option>
                                            <option value="converted">转文字</option>
                                        </select>
                                    </div>
                                </div>
                                <div v-if="msg.status === 'converted'" class="mt-2">
                                    <label class="block text-xs text-gray-500 mb-1">转换的文字内容</label>
                                    <textarea v-model="msg.convertedText" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                                </div>
                            </div>

                            <div v-if="msg.type === 'call'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-blue-600 font-medium">语音/视频通话</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop>
                                        <input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的
                                    </label>
                                </div>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm mt-1 focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                            </div>

                            <div v-if="msg.type === 'transfer'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-orange-600 font-medium">转账设置</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop>
                                        <input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的
                                    </label>
                                </div>
                                <div class="mt-2 mb-3">
                                    <label class="block text-xs text-gray-500 mb-1">状态</label>
                                    <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                        <option value="pending">待接收</option>
                                        <option value="accepted">已接收</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">金额</label>
                                        <input v-model="msg.amount" type="text" class="w-full px-3 py-1.5 border rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">副标题</label>
                                        <input v-model="msg.title" type="text" class="w-full px-3 py-1.5 border rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </transition-group>
            </div>
        </div>

        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 z-20 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="grid grid-cols-3 gap-2">
                <button @click="addMessage('text')" class="bg-white border border-gray-300 hover:bg-gray-100 text-sm py-2 rounded-md transition shadow-sm text-gray-700">文字</button>
                <button @click="addMessage('image')" class="bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-600 text-sm py-2 rounded-md transition shadow-sm">图片</button>
                <button @click="addMessage('voice')" class="bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-600 text-sm py-2 rounded-md transition shadow-sm">语音</button>
                
                <button @click="addMessage('transfer')" class="bg-orange-50 border border-orange-200 hover:bg-orange-100 text-orange-600 text-sm py-2 rounded-md transition shadow-sm">转账</button>
                <button @click="addMessage('call')" class="bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-600 text-sm py-2 rounded-md transition shadow-sm">通话</button>
                <button @click="addMessage('nudge')" class="bg-purple-50 border border-purple-200 hover:bg-purple-100 text-purple-600 text-sm py-2 rounded-md transition shadow-sm">拍一拍</button>
                
                <button @click="addMessage('time')" class="bg-gray-100 border border-gray-300 hover:bg-gray-200 text-sm py-2 rounded-md transition shadow-sm col-span-3">添加时间戳</button>
            </div>
        </div>

    </div>

    <div class="flex-1 flex justify-center items-center">
        <div class="relative shadow-[0_0_50px_rgba(0,0,0,0.1)] rounded-[40px] border-[8px] border-[#e5e5e5] bg-black overflow-hidden" style="width: 375px; height: 812px;">
            
            <div id="wechat-preview" class="w-full h-full flex flex-col relative text-[17px] wechat-dark-bg">
                
                <div class="flex items-center justify-between px-[20px] pt-[12px] pb-[4px] text-white relative bg-[#111111] h-[36px] shrink-0">
                    <div v-if="returnAppText" class="absolute left-[16px] top-[14px] flex items-center text-[11px] font-medium tracking-wide">
                        <svg class="w-3 h-3 fill-current mr-[1px]" viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8z"/></svg>
                        <span>{{ returnAppText }}</span>
                    </div>
                    <div class="w-full text-center tracking-wider font-semibold text-[15px] leading-none">{{ statusBarTime }}</div>
                    <div class="absolute right-[16px] top-[14px] flex items-center space-x-[5px]">
                        <svg class="w-[17px] h-[11px] fill-white" viewBox="0 0 18 12">
                            <rect x="0" y="8" width="3" height="4" rx="1"/>
                            <rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/>
                            <rect x="9" y="3" width="3" height="9" rx="1"/>
                            <rect x="13.5" y="0" width="3" height="12" rx="1"/>
                        </svg>
                        <span class="text-[13px] font-medium leading-none text-white tracking-wide mt-[1px]">5G</span>
                        <div class="w-[23px] h-[11.5px] border-[1px] rounded-[3px] p-[1px] relative border-white/60 flex items-center">
                            <div class="h-full w-full rounded-[1.5px] bg-white"></div>
                            <div class="absolute -right-[2.5px] w-[1.5px] h-[4px] rounded-r-[2px] bg-white/60"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between px-[14px] py-[8px] border-b-[0.5px] z-10 bg-[#111111] border-white/10 text-white shrink-0">
                    <div class="flex items-center w-1/3 cursor-pointer">
                        <svg class="w-[26px] h-[26px] -ml-[4px] text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                        <div v-if="unreadCount" class="bg-[#2c2c2c] text-white/90 text-[13px] px-[8px] py-[1px] rounded-[12px] ml-[2px] font-medium flex items-center justify-center">{{ unreadCount }}</div>
                    </div>
                    <div class="text-[17px] font-medium tracking-wide truncate text-center flex-1">{{ chatName }}</div>
                    <div class="flex justify-end w-1/3 cursor-pointer">
                        <svg class="w-[22px] h-[22px]" fill="currentColor" viewBox="0 0 24 24"><path d="M6 12a2 2 0 11-4 0 2 2 0 014 0zm8 0a2 2 0 11-4 0 2 2 0 014 0zm8 0a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar px-[14px] py-4 flex flex-col space-y-[18px]">
                    
                    <template v-for="msg in messages" :key="msg.id">
                        
                        <div v-if="msg.type === 'time'" class="text-center mt-1 mb-0">
                            <span class="text-[12px] text-white/40">{{ msg.content }}</span>
                        </div>

                        <div v-if="msg.type === 'nudge'" class="text-center mt-1 mb-0">
                            <span class="text-[13px] text-white/50">{{ msg.content }}</span>
                        </div>

                        <div v-if="msg.type !== 'time' && msg.type !== 'nudge'" class="flex gap-[10px] items-start" :class="{'flex-row-reverse': msg.isMe}">
                            <img :src="msg.isMe ? myAvatar : otherAvatar" class="w-[40px] h-[40px] rounded-[4px] object-cover flex-shrink-0 bg-gray-800">
                            
                            <div class="flex flex-col" :class="{'items-end': msg.isMe}">
                                <span v-if="!msg.isMe && showOtherName" class="text-[12px] mb-[2px] ml-[2px] text-white/50">{{ otherName }}</span>

                                <div v-if="msg.type === 'text'" 
                                     class="text-bubble bubble-tail shadow-sm" 
                                     :class="msg.isMe ? 'wechat-dark-right bubble-right-dark' : 'wechat-dark-left bubble-left-dark'">
                                    {{ msg.content }}
                                </div>

                                <div v-if="msg.type === 'image'" class="image-bubble bg-gray-900 shadow-sm">
                                    <img :src="msg.imageUrl" class="w-full h-full object-cover block">
                                </div>

                                <div v-if="msg.type === 'voice'" class="flex flex-col" :class="msg.isMe ? 'items-end' : 'items-start'">
                                    <div class="flex items-center gap-[6px]" :class="msg.isMe ? 'flex-row-reverse' : 'flex-row'">
                                        <div class="text-bubble bubble-tail shadow-sm flex items-center cursor-pointer relative z-10"
                                             :class="msg.isMe ? 'wechat-dark-right bubble-right-dark flex-row-reverse' : 'wechat-dark-left bubble-left-dark flex-row'"
                                             :style="{ width: getVoiceWidth(msg.duration) }">
                                            <svg class="w-5 h-5 flex-shrink-0" :class="msg.isMe ? 'text-black' : 'text-white/80'" :style="{ transform: msg.isMe ? 'scaleX(-1)' : 'none' }" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                                <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                                                <path d="M10 8.5a5 5 0 0 1 0 7" />
                                                <path d="M15 5a10 10 0 0 1 0 14" />
                                            </svg>
                                            <span class="text-[15px] leading-none mt-[1px]" :class="msg.isMe ? 'mr-[5px]' : 'ml-[5px]'">{{ msg.duration }}"</span>
                                        </div>
                                        <div v-if="msg.status === 'unread'" class="w-[8px] h-[8px] bg-[#ff4d4f] rounded-full flex-shrink-0 mt-[2px]"></div>
                                    </div>
                                    <div v-if="msg.status === 'converted'" 
                                         class="mt-[4px] text-[16px] leading-[22px] px-[12px] py-[9px] rounded-[6px] max-w-[250px] break-words shadow-sm relative z-10"
                                         :class="msg.isMe ? 'bg-[#27c24c] text-black' : 'bg-[#2c2c2c] text-[#e5e5e5]'">
                                        {{ msg.convertedText }}
                                    </div>
                                </div>

                                <div v-if="msg.type === 'call'" 
                                     class="text-bubble bubble-tail shadow-sm flex items-center" 
                                     :class="msg.isMe ? 'wechat-dark-right bubble-right-dark' : 'wechat-dark-left bubble-left-dark'">
                                    <svg class="w-[17px] h-[17px] flex-shrink-0 mr-[6px]" :class="msg.isMe ? 'text-black' : 'text-white'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.595-5.22-3.92-6.815-6.816l1.293-.97c.362-.271.527-.733.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                                    </svg>
                                    <span>{{ msg.content }}</span>
                                </div>

                                <div v-if="msg.type === 'transfer'" 
                                     class="finance-bubble bubble-tail shadow-sm" 
                                     :class="[
                                         msg.status === 'pending' ? 'transfer-pending' : 'transfer-accepted',
                                         msg.isMe ? (msg.status === 'pending' ? 'bubble-right-orange-pending' : 'bubble-right-orange-accepted') : (msg.status === 'pending' ? 'bubble-left-orange-pending' : 'bubble-left-orange-accepted')
                                     ]">
                                    <div class="flex items-center gap-[12px] px-[12px] pt-[10px] pb-[8px] relative z-10">
                                        <div class="w-[34px] h-[34px] rounded-full flex items-center justify-center flex-shrink-0 border-[1px]"
                                             :class="msg.status === 'pending' ? 'border-white/80' : 'border-white/30'">
                                            <svg v-if="msg.status === 'pending'" class="w-[18px] h-[18px] text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                                            </svg>
                                            <svg v-else class="w-[20px] h-[20px] text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                            </svg>
                                        </div>
                                        <div class="flex flex-col justify-center overflow-hidden">
                                            <div class="text-[16px] font-normal leading-[20px] break-all" 
                                                 :class="msg.status === 'pending' ? 'text-white' : 'text-white/65'">
                                                {{ msg.amount }}
                                            </div>
                                            <div class="text-[12px] leading-[16px] mt-[1px] break-all"
                                                 :class="msg.status === 'pending' ? 'text-white/70' : 'text-white/40'">
                                                {{ msg.title }}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="px-[12px] pb-[4px] pt-[3px] text-[11px] relative z-10"
                                         :class="msg.status === 'pending' ? 'text-white/70 border-t-[0.5px] border-white/20' : 'text-white/40 border-t-[0.5px] border-white/5'">
                                        {{ msg.bottomText }}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                    <div class="h-2"></div>
                </div>

                <div class="px-[14px] py-[8px] flex items-center gap-[12px] z-10 pb-safe bg-[#111111] border-t-[0.5px] border-white/10 shrink-0">
                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                        <circle cx="12" cy="12" r="11"/>
                        <path d="M8.5 12a1 1 0 11-2 0 1 1 0 012 0z" fill="currentColor" stroke="none"/>
                        <path d="M11.5 9.5a3.5 3.5 0 010 5" stroke-linecap="round"/>
                        <path d="M14.5 7.5a6.5 6.5 0 010 9" stroke-linecap="round"/>
                    </svg>
                    <div class="flex-1 rounded-[6px] h-[36px] bg-[#2c2c2e] relative flex items-center">
                        <svg class="w-5 h-5 text-white/40 absolute right-2" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </div>
                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                        <circle cx="12" cy="12" r="11"/>
                        <path d="M8 10h.01M16 10h.01M8 15a4 4 0 008 0" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
                        <circle cx="12" cy="12" r="11"/>
                        <path d="M12 7v10M7 12h10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const defaultMyAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%232c3e50"/><circle cx="50" cy="40" r="16" fill="%23fce2c4"/><path d="M 25 100 L 35 65 Q 50 55 65 65 L 75 100" fill="%23fce2c4"/></svg>';
    const defaultOtherAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23c0392b"/><circle cx="50" cy="50" r="30" fill="%23f1c40f"/><path d="M 35 35 L 45 45 L 35 55 M 65 35 L 55 45 L 65 55" stroke="%23c0392b" stroke-width="4" fill="none"/></svg>';
    const defaultImage = 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200&auto=format&fit=crop';

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                statusBarTime: '21:43', 
                returnAppText: '', 
                chatName: '塔西', 
                unreadCount: '92', 
                otherName: '塔西', 
                showOtherName: false, 
                myAvatar: defaultMyAvatar,
                otherAvatar: defaultOtherAvatar,
                messages: [
                    { id: 1, type: 'time', content: '21:41' },
                    { id: 2, type: 'image', isMe: true, imageUrl: 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=200&auto=format&fit=crop' },
                    { id: 3, type: 'image', isMe: true, imageUrl: 'https://images.unsplash.com/photo-1561089489-f13d5e730d72?q=80&w=200&auto=format&fit=crop' }
                ],
                dragIndex: null,
                dragOverIndex: null
            }
        },
        methods: {
            getVoiceWidth(sec) {
                if(!sec || sec < 1) sec = 1;
                const width = 70 + (sec * 4); 
                return Math.min(width, 220) + 'px';
            },
            addMessage(type) {
                const baseMsg = { id: Date.now(), type: type, isMe: true };
                if (type === 'text') baseMsg.content = '输入内容...';
                else if (type === 'image') baseMsg.imageUrl = defaultImage;
                else if (type === 'voice') {
                    baseMsg.duration = 10; baseMsg.status = 'unread'; baseMsg.convertedText = '转换后的文字...';
                }
                else if (type === 'transfer') {
                    baseMsg.amount = '¥100.00'; baseMsg.title = '请收款'; baseMsg.bottomText = '转账'; baseMsg.status = 'pending';
                } else if (type === 'call') baseMsg.content = '通话时长 12:34';
                else if (type === 'time') {
                    const now = new Date();
                    baseMsg.content = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                } else if (type === 'nudge') baseMsg.content = '我拍了拍 "对方"';

                this.messages.push(baseMsg);
                this.scrollToBottom();
            },
            removeMessage(index) {
                this.messages.splice(index, 1);
            },
            onDragStart(event, index) {
                this.dragIndex = index;
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', index);
            },
            onDragEnter(index) {
                if(this.dragIndex !== index) this.dragOverIndex = index;
            },
            onDragOver(event, index) { event.preventDefault(); },
            onDragLeave(index) {
                if(this.dragOverIndex === index) this.dragOverIndex = null;
            },
            onDrop(event, index) {
                if (this.dragIndex !== null && this.dragIndex !== index) {
                    const draggedItem = this.messages.splice(this.dragIndex, 1)[0];
                    this.messages.splice(index, 0, draggedItem);
                }
                this.dragIndex = null;
                this.dragOverIndex = null;
            },
            onDragEnd() {
                this.dragIndex = null;
                this.dragOverIndex = null;
            },
            onAvatarChange(event, type) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (type === 'me') this.myAvatar = e.target.result;
                        else this.otherAvatar = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            },
            onMsgImageUpload(event, msg) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        msg.imageUrl = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            },
            scrollToBottom() {
                setTimeout(() => {
                    const preview = document.querySelector('#wechat-preview > div:nth-child(3)');
                    if (preview) preview.scrollTop = preview.scrollHeight;
                    const editPanel = document.querySelector('#edit-panel-scroll');
                    if (editPanel) editPanel.scrollTop = editPanel.scrollHeight;
                }, 50);
            },
            generateImage() {
                const node = document.getElementById('wechat-preview');
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '正在生成超清截图...';
                
                htmlToImage.toPng(node, {
                    pixelRatio: 3, 
                    backgroundColor: '#111111',
                    style: { transform: 'scale(1)', transformOrigin: 'top left' }
                })
                .then(function (dataUrl) {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `微信截图_${new Date().getTime()}.png`;
                    a.click();
                })
                .catch(function (error) {
                    console.error('导出失败!', error);
                    alert('截图生成失败，请重试');
                })
                .finally(function () {
                    btn.innerHTML = originalText;
                });
            }
        }
    }).mount('#app');
</script>

</body>
</html>
