<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天截图生成器 Gemini版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        body {
            /* 优先调用苹果原生系统字体 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f3f4f6;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* 气泡小尾巴基础设定 */
        .bubble-tail::before {
            content: ''; position: absolute; top: 13px; width: 8px; height: 8px;
            transform: rotate(45deg); border-radius: 1px; z-index: 0;
        }
        
        /* 尾巴方向与颜色映射 */
        .bubble-left-dark::before { left: -3.5px; background-color: #2c2c2c; }
        .bubble-right-dark::before { right: -3.5px; background-color: #27c24c; }
        .bubble-left-light::before { left: -3.5px; background-color: #ffffff; }
        .bubble-right-light::before { right: -3.5px; background-color: #95ec69; }
        
        /* 转账尾巴映射 */
        .bubble-left-orange-pending-light::before, .bubble-left-orange-pending-dark::before { left: -3.5px; background-color: #f29c38; }
        .bubble-right-orange-pending-light::before, .bubble-right-orange-pending-dark::before  { right: -3.5px; background-color: #f29c38; }
        .bubble-left-orange-accepted-dark::before { left: -3.5px; background-color: #b37327; }
        .bubble-right-orange-accepted-dark::before { right: -3.5px; background-color: #b37327; }
        .bubble-left-orange-accepted-light::before { left: -3.5px; background-color: #f9d1a1; }
        .bubble-right-orange-accepted-light::before { right: -3.5px; background-color: #f9d1a1; }

        /* 文本气泡核心规范（V18 修复字间距与左右内边距） */
        .text-bubble {
            font-size: 15px;      /* 恢复原生标准字号 */ 
            line-height: 1.2;     /* 字体上下间隔 */
            font-weight: 400;     /* 字体粗细 */
            letter-spacing: 0px;  /* 模拟苹果原生系统字距，增加呼吸感 */
            padding: 9px 10px;   /* 加宽左右内边距，文字不再贴边 */
            max-width: 230px; border-radius: 5px;/* 泡泡圆角 */
            word-wrap: break-word; word-break: break-all; white-space: pre-wrap;
            position: relative; z-index: 10;
        }
       
            .finance-bubble { width: 218px; border-radius: 6px; position: relative; z-index: 10; }
            .image-bubble {
            max-width: 130px; /* 图片约占屏幕宽度 375px 的 34% */
            max-height: 220px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            z-index: 10;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .wechat-dark-bg { background-color: #111111; }
        .wechat-dark-left { background-color: #2c2c2c; color: #e5e5e5; }
        .wechat-dark-right { background-color: #27c24c; color: #000000; }
        .transfer-pending { background-color: #f29c38; color: #ffffff; }
        .transfer-accepted { background-color: #b37327; color: rgba(255, 255, 255, 0.65); }
       
        /* 背景与字体颜色基准 */
        .wechat-dark-bg { background-color: #111111; }
        .wechat-dark-left { background-color: #2c2c2c; color: #e5e5e5; }
        .wechat-dark-right { background-color: #27c24c; color: #000000; }
        
        .wechat-light-bg { background-color: #ededed; }
        .wechat-light-left { background-color: #ffffff; color: #191919; } /* 柔和深灰黑 */
        .wechat-light-right { background-color: #95ec69; color: #191919; }

        /* 转账气泡颜色规范 */
        .transfer-pending-light, .transfer-pending-dark { background-color: #f29c38; color: #ffffff; }
        .transfer-accepted-dark { background-color: #ff8c00; color: #ffffff; }
        .transfer-accepted-light { background-color: #f9d1a1; color: #ffffff; }

        /* 浅色模式极度柔和弥散阴影 */
        .wechat-soft-shadow {
            box-shadow: 0 3px 100px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.02) !important;
        }

        /* 拖拽动画 */
        .draggable-item { cursor: grab; transition: transform 0.2s, box-shadow 0.2s; }
        .draggable-item:active { cursor: grabbing; }
        .is-dragging { opacity: 0.4; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); transform: scale(1.02); z-index: 50; }
        .drag-over { border-top: 3px solid #3b82f6 !important; padding-top: 13px !important; }
        .msg-list-move, .msg-list-enter-active, .msg-list-leave-active { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .msg-list-enter-from, .msg-list-leave-to { opacity: 0; transform: translateY(15px); }
        .msg-list-leave-active { position: absolute; width: 100%; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen flex flex-col md:flex-row max-w-[1400px] mx-auto p-4 md:p-8 gap-8">
    
    <div class="w-full md:w-[480px] bg-white rounded-xl shadow-lg flex flex-col h-[calc(100vh-4rem)] overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white z-20 shrink-0">
            <h1 class="text-xl font-bold text-gray-800">微信截图编辑器 V18</h1>
            <div class="flex gap-2">
                <button @click="resetState" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg font-medium transition flex items-center gap-1 shadow-sm text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    重置
                </button>
                <button @click="generateImage" class="bg-[#27c24c] hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    导出截图
                </button>
            </div>
        </div>

        <div id="edit-panel-scroll" class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 space-y-6 relative">
            
            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center border-b border-gray-200 pb-3 mb-1">
                    <h2 class="font-semibold text-gray-700">全局外观</h2>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" v-model="isDarkMode" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gray-800"></div>
                        <span class="ml-3 text-sm font-medium" :class="isDarkMode ? 'text-gray-800' : 'text-gray-500'">{{ isDarkMode ? '深色模式' : '浅色模式' }}</span>
                    </label>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">手机时间</label>
                        <input v-model="statusBarTime" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">左上角返回</label>
                        <input v-model="returnAppText" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="留空隐藏">
                    </div>
                </div>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">聊天标题</label>
                        <input v-model="chatName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">未读数</label>
                        <input v-model="unreadCount" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="如: 92">
                    </div>
                </div>
            </div>

            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold text-gray-700">人物设置</h2>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" v-model="showOtherName" class="rounded text-green-600 w-4 h-4"> 显示昵称
                    </label>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">对方昵称</label>
                    <input v-model="otherName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="flex gap-6 mt-2">
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">我的头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="myAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'me')">
                        </label>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">对方头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="otherAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'other')">
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4 pb-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                        聊天内容编排 
                        <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full">长按模块可拖拽排序</span>
                    </h2>
                </div>
                
                <transition-group name="msg-list" tag="div" class="space-y-4 relative w-full">
                    <div v-for="(msg, index) in messages" :key="msg.id" 
                         draggable="true" @dragstart="onDragStart($event, index)" @dragover.prevent="onDragOver($event, index)" @dragenter.prevent="onDragEnter(index)" @dragleave.prevent="onDragLeave(index)" @drop="onDrop($event, index)" @dragend="onDragEnd"
                         class="draggable-item bg-gray-50 p-4 rounded-lg border border-gray-200 relative group hover:border-gray-400 w-full"
                         :class="{ 'is-dragging': dragIndex === index, 'drag-over': dragOverIndex === index }">
                        
                        <div class="absolute left-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-30 transition cursor-grab text-gray-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </div>
                        <button @click.stop="removeMessage(index)" class="absolute -right-2 -top-2 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition shadow-md flex items-center justify-center text-sm z-10 hover:bg-red-600">×</button>
                        
                        <div class="pl-3">
                            <div v-if="msg.type === 'time' || msg.type === 'nudge'">
                                <label class="block text-xs text-gray-500 mb-1">{{ msg.type === 'time' ? '对话时间' : '系统提示' }}</label>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm text-center focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            
                            <div v-if="msg.type === 'text'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label>文本内容</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <textarea v-model="msg.content" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                            </div>
                            
                            <div v-if="msg.type === 'call'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-blue-600 font-medium">语音通话</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm mt-1 focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                            </div>

                            <div v-if="msg.type === 'image'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-indigo-600 font-medium">图片消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="mt-2 flex items-center gap-4">
                                    <img :src="msg.imageUrl" class="w-16 h-16 object-cover rounded border border-gray-300">
                                    <label class="bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded cursor-pointer text-sm transition" @mousedown.stop>
                                        点击上传<input type="file" class="hidden" accept="image/*" @change="e => onMsgImageUpload(e, msg)">
                                    </label>
                                </div>
                            </div>

                            <div v-if="msg.type === 'voice'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-pink-600 font-medium">语音消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="flex gap-2 mt-2 mb-2">
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">时长(秒)</label>
                                        <input v-model.number="msg.duration" type="number" min="1" max="60" class="w-full px-3 py-1.5 border rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">状态</label>
                                        <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                            <option value="unread">未读</option><option value="read">已读</option><option value="converted">转文字</option>
                                        </select>
                                    </div>
                                </div>
                                <div v-if="msg.status === 'converted'" class="mt-2">
                                    <label class="block text-xs text-gray-500 mb-1">转换文字</label>
                                    <textarea v-model="msg.convertedText" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                                </div>
                            </div>

                            <div v-if="msg.type === 'transfer'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-orange-600 font-medium">转账</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="mt-2 mb-3">
                                    <label class="block text-xs text-gray-500 mb-1">状态</label>
                                    <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                        <option value="pending">待接收</option><option value="accepted">已接收</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <div class="flex-1"><label class="block text-xs text-gray-500 mb-1">金额</label><input v-model="msg.amount" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                                    <div class="flex-1"><label class="block text-xs text-gray-500 mb-1">副标题</label><input v-model="msg.title" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                                </div>
                                <div class="mt-2"><label class="block text-xs text-gray-500 mb-1">底部小字</label><input v-model="msg.bottomText" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                            </div>

                        </div>
                    </div>
                </transition-group>
            </div>
        </div>

        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 z-20 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="grid grid-cols-3 gap-2">
                <button @click="addMessage('text')" class="bg-white border border-gray-300 hover:bg-gray-100 text-sm py-2 rounded-md transition shadow-sm text-gray-700">文字</button>
                <button @click="addMessage('image')" class="bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-600 text-sm py-2 rounded-md transition shadow-sm">图片</button>
                <button @click="addMessage('voice')" class="bg-pink-50 border border-pink-200 hover:bg-pink-100 text-pink-600 text-sm py-2 rounded-md transition shadow-sm">语音</button>
                <button @click="addMessage('transfer')" class="bg-orange-50 border border-orange-200 hover:bg-orange-100 text-orange-600 text-sm py-2 rounded-md transition shadow-sm">转账</button>
                <button @click="addMessage('call')" class="bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-600 text-sm py-2 rounded-md transition shadow-sm">通话</button>
                <button @click="addMessage('nudge')" class="bg-purple-50 border border-purple-200 hover:bg-purple-100 text-purple-600 text-sm py-2 rounded-md transition shadow-sm">拍一拍</button>
                <button @click="addMessage('time')" class="bg-gray-100 border border-gray-300 hover:bg-gray-200 text-sm py-2 rounded-md transition shadow-sm col-span-3">添加时间戳</button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex justify-center items-center">
        <div class="relative shadow-[0_0_50px_rgba(0,0,0,0.1)] rounded-[40px] border-[8px] border-[#e5e5e5] bg-black overflow-hidden" style="width: 375px; height: 812px;">
            
            <div id="wechat-preview" class="w-full h-full flex flex-col relative text-[17px] transition-colors duration-300"
                 :class="isDarkMode ? 'wechat-dark-bg' : 'wechat-light-bg'">
                
                <div class="flex items-center justify-between px-[15px] pt-[10px] pb-[4px] relative shrink-0 transition-colors duration-300 h-[44px]"
                     :class="isDarkMode ? 'bg-[#111111] text-white' : 'bg-[#ededed] text-black'">
                    
                    <div class="absolute left-[45px] top-[15px] flex flex-col items-start">
                        <div class="tracking-wider font-semibold text-[15px] leading-none pl-[2px]">{{ statusBarTime }}</div>
                        <div v-if="returnAppText" class="flex items-center text-[10px] font-medium tracking-wide mt-[3px]">
                            <svg class="w-[10px] h-[10px] fill-current mr-[1px]" viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8z"/></svg>
                            <span>{{ returnAppText }}</span>
                        </div>
                    </div>

                    <div class="w-full text-center"></div>

                    <div class="absolute right-[25px] top-[15px] flex items-center space-x-[5px]">
                        <svg class="w-[17px] h-[11px]" :class="isDarkMode ? 'fill-white' : 'fill-black'" viewBox="0 0 18 12">
                            <rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/>
                            <rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/>
                        </svg>
                        <span class="text-[13px] font-medium leading-none tracking-wide mt-[1px]" :class="isDarkMode ? 'text-white' : 'text-black'">5G</span>
                        <div class="w-[23px] h-[11.5px] border-[1px] rounded-[3px] p-[1px] relative flex items-center" :class="isDarkMode ? 'border-white/60' : 'border-black/60'">
                            <div class="h-full w-full rounded-[1.5px]" :class="isDarkMode ? 'bg-white' : 'bg-black'"></div>
                            <div class="absolute -right-[2.5px] w-[1.5px] h-[4px] rounded-r-[2px]" :class="isDarkMode ? 'bg-white/60' : 'bg-black/60'"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between px-[15px] py-[8px] border-b-[0.5px] z-10 shrink-0 transition-colors duration-300"
                     :class="isDarkMode ? 'bg-[#111111] border-white/10 text-white' : 'bg-[#ededed] border-black/10 text-black'">
                    <div class="flex items-center w-1/3 cursor-pointer">
                        <svg class="w-[26px] h-[26px] -ml-[3px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                        <div v-if="unreadCount" class="text-[13px] px-[6px] py-[1px] rounded-[12px] ml-[1px] font-medium flex items-center justify-center"
                             :class="isDarkMode ? 'bg-[#2c2c2c] text-white/90' : 'bg-[#dfdfdf] text-black'">{{ unreadCount }}</div>
                    </div>
                    <div class="text-[15px] font-medium tracking-wide truncate text-center flex-1">{{ chatName }}</div> 
                    <div class="flex justify-end w-1/3 cursor-pointer">
                        <svg class="w-[22px] h-[22px]" fill="currentColor" viewBox="0 0 24 24"><path d="M6 12a2 2 0 11-4 0 2 2 0 014 0zm8 0a2 2 0 11-4 0 2 2 0 014 0zm8 0a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar px-[14px] py-4 flex flex-col">
                    
                    <template v-for="msg in messages" :key="msg.id">
                        
                        <div v-if="msg.type === 'time'" class="text-center mt-[10px] mb-[12px]">
                            <span class="text-[12px] font-normal tracking-wide" :class="isDarkMode ? 'text-white/40' : 'text-[#b2b2b2]'">{{ msg.content }}</span>
                        </div>

                        <div v-if="msg.type === 'nudge'" class="text-center mt-[6px] mb-[16px]">
                            <span class="text-[13px] font-medium" :class="isDarkMode ? 'text-white/50' : 'text-black/40'">{{ msg.content }}</span>
                        </div>

                        <div v-if="msg.type !== 'time' && msg.type !== 'nudge'" class="flex gap-[10px] items-start mb-[18px]" :class="{'flex-row-reverse': msg.isMe}">
                            <img :src="msg.isMe ? myAvatar : otherAvatar" class="w-[40px] h-[40px] rounded-[4px] object-cover flex-shrink-0"
                                 :class="isDarkMode ? 'bg-gray-800' : 'bg-gray-200'">
                            
                            <div class="flex flex-col" :class="{'items-end': msg.isMe}">
                                <span v-if="!msg.isMe && showOtherName" class="text-[12px] mb-[2px] ml-[2px]" :class="isDarkMode ? 'text-white/50' : 'text-black/40'">{{ otherName }}</span>

                                <div v-if="msg.type === 'text'" 
                                     class="text-bubble bubble-tail transition-colors duration-300" 
                                     :class="getTextClass(msg)">
                                    {{ msg.content }}
                                </div>

                                <div v-if="msg.type === 'image'" class="image-bubble border-[0.5px] transition-colors duration-300"
                                     :class="isDarkMode ? 'bg-gray-900 border-white/10' : 'bg-gray-100 border-black/10 wechat-soft-shadow'">
                                    <img :src="msg.imageUrl" class="w-full h-full object-cover block">
                                </div>

                                <div v-if="msg.type === 'voice'" class="flex flex-col" :class="msg.isMe ? 'items-end' : 'items-start'">
                                    <div class="flex items-center gap-[6px]" :class="msg.isMe ? 'flex-row-reverse' : 'flex-row'">
                                        <div class="text-bubble bubble-tail flex items-center cursor-pointer relative z-10 transition-colors duration-300"
                                             :class="[getTextClass(msg), msg.isMe ? 'flex-row-reverse' : 'flex-row']"
                                             :style="{ width: getVoiceWidth(msg.duration) }">
                                            <svg class="w-5 h-5 flex-shrink-0" 
                                                 :class="isDarkMode ? (msg.isMe ? 'text-black' : 'text-white/80') : 'text-black'" 
                                                 :style="{ transform: msg.isMe ? 'scaleX(-1)' : 'none' }" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                                <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                                                <path d="M10 8.5a5 5 0 0 1 0 7" />
                                                <path d="M15 5a10 10 0 0 1 0 14" />
                                            </svg>
                                            <span class="text-[15px] leading-none mt-[1px]" :class="msg.isMe ? 'mr-[5px]' : 'ml-[5px]'">{{ msg.duration }}"</span>
                                        </div>
                                        <div v-if="msg.status === 'unread'" class="w-[8px] h-[8px] bg-[#ff4d4f] rounded-full flex-shrink-0 mt-[2px]"></div>
                                    </div>
                                    <div v-if="msg.status === 'converted'" 
                                         class="mt-[4px] text-[16px] leading-[22px] px-[12px] py-[9px] rounded-[6px] max-w-[250px] break-words relative z-10 transition-colors duration-300"
                                         :class="isDarkMode ? (msg.isMe ? 'bg-[#27c24c] text-black' : 'bg-[#2c2c2c] text-[#e5e5e5]') : (msg.isMe ? 'bg-[#ffffff] text-black wechat-soft-shadow' : 'bg-[#ffffff] text-black wechat-soft-shadow')">
                                        {{ msg.convertedText }}
                                    </div>
                                </div>

                                <div v-if="msg.type === 'call'" 
                                     class="text-bubble bubble-tail flex items-center transition-colors duration-300" 
                                     :class="[getTextClass(msg), msg.isMe ? '!text-black' : '']">
                                    <template v-if="msg.isMe">
                                        <span class="mr-[6px]">{{ msg.content }}</span>
                                        <svg class="w-[18px] h-[18px] flex-shrink-0" :class="isDarkMode ? 'text-black' : 'text-black'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.595-5.22-3.92-6.815-6.816l1.293-.97c.362-.271.527-.733.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                                        </svg>
                                    </template>
                                    <template v-else>
                                        <svg class="w-[18px] h-[18px] flex-shrink-0 mr-[6px]" :class="isDarkMode ? 'text-white' : 'text-black'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.595-5.22-3.92-6.815-6.816l1.293-.97c.362-.271.527-.733.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
                                        </svg>
                                        <span>{{ msg.content }}</span>
                                    </template>
                                </div>

                                <div v-if="msg.type === 'transfer'" 
                                     class="finance-bubble bubble-tail transition-colors duration-300" 
                                     :class="getTransferClass(msg)">
                                    <div class="flex items-center gap-[12px] px-[12px] pt-[10px] pb-[8px] relative z-10">
                                        <div class="w-[34px] h-[34px] rounded-full flex items-center justify-center flex-shrink-0 border-[1.5px]"
                                             :class="isDarkMode ? (msg.status === 'pending' ? 'border-white/80' : 'border-white/30') : (msg.status === 'pending' ? 'border-white/90' : 'border-white/90')">
                                            
                                            <svg v-if="msg.status === 'pending'" class="w-[18px] h-[18px] text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                                            </svg>
                                            <svg v-else class="w-[20px] h-[20px] text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                            </svg>
                                        </div>
                                        <div class="flex flex-col justify-center overflow-hidden">
                                            <div class="text-[16px] font-normal leading-[20px] break-all text-white">
                                                {{ msg.amount }}
                                            </div>
                                            <div class="text-[12px] leading-[16px] mt-[1px] break-all"
                                                 :class="isDarkMode ? (msg.status === 'pending' ? 'text-white/80' : 'text-white/60') : (msg.status === 'pending' ? 'text-white/90' : 'text-white/80')">
                                                {{ msg.title }}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="px-[12px] pb-[4px] pt-[3px] text-[11px] relative z-10"
                                         :class="isDarkMode ? (msg.status === 'pending' ? 'text-white/70 border-t-[0.5px] border-white/20' : 'text-white/50 border-t-[0.5px] border-white/10') : (msg.status === 'pending' ? 'text-white/80' : 'text-white/70')">
                                        {{ msg.bottomText }}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                </div>

                <div class="px-[14px] py-[8px] flex items-center gap-[12px] z-10 pb-safe shrink-0 border-t-[0.5px] transition-colors duration-300"
                     :class="isDarkMode ? 'bg-[#111111] border-white/10' : 'bg-[#f7f7f7] border-black/10'">
                    
                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer" :class="isDarkMode ? 'text-white' : 'text-black/80'" viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="6" fill="none"/>
                        <path d="M 28 50 L 34 44 A 8.5 8.5 0 0 1 34 56 Z" fill="currentColor"/>
                        <path d="M 44 34 A 22.6 22.6 0 0 1 44 66" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="butt"/>
                        <path d="M 56 22 A 39.6 39.6 0 0 1 56 78" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="butt"/>
                    </svg>

                    <div class="flex-1 rounded-[6px] h-[36px] relative flex items-center transition-colors duration-300"
                         :class="isDarkMode ? 'bg-[#2c2c2e]' : 'bg-white'">
                        <svg class="w-[20px] h-[20px] absolute right-2 cursor-pointer" :class="isDarkMode ? 'text-white/40' : 'text-black/30'" viewBox="0 0 100 100" fill="none">
                            <rect x="35" y="16" width="30" height="46" rx="15" stroke="currentColor" stroke-width="8" fill="none"/>
                            <path d="M 24 45 L 24 54 A 26 26 0 0 0 76 54 L 76 45" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="butt"/>
                            <line x1="50" y1="80" x2="50" y2="92" stroke="currentColor" stroke-width="8" stroke-linecap="butt"/>
                        </svg>
                    </div>

                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer" :class="isDarkMode ? 'text-white' : 'text-black/80'" viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="6" fill="none"/>
                        <circle cx="34" cy="36" r="5" fill="currentColor"/>
                        <circle cx="66" cy="36" r="5" fill="currentColor"/>
                        <path d="M 30 56 L 70 56 A 20 20 0 0 1 30 56 Z" stroke="currentColor" stroke-width="6" fill="none" stroke-linejoin="round"/>
                    </svg>

                    <svg class="w-[28px] h-[28px] flex-shrink-0 cursor-pointer" :class="isDarkMode ? 'text-white' : 'text-black/80'" viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="50" r="42" stroke="currentColor" stroke-width="6" fill="none"/>
                        <path d="M 50 26 L 50 74 M 26 50 L 74 50" stroke="currentColor" stroke-width="6" stroke-linecap="butt"/>
                    </svg>

                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const defaultMyAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%232c3e50"/><circle cx="50" cy="40" r="16" fill="%23fce2c4"/><path d="M 25 100 L 35 65 Q 50 55 65 65 L 75 100" fill="%23fce2c4"/></svg>';
    const defaultOtherAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23c0392b"/><circle cx="50" cy="50" r="30" fill="%23f1c40f"/><path d="M 35 35 L 45 45 L 35 55 M 65 35 L 55 45 L 65 55" stroke="%23c0392b" stroke-width="4" fill="none"/></svg>';
    const defaultImage = 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200&auto=format&fit=crop';

    // 定义一套初始默认数据，方便重置和初始化
    const defaultState = {
        isDarkMode: false, 
        statusBarTime: '18:43', 
        returnAppText: '', 
        chatName: '塔西', 
        unreadCount: '92', 
        otherName: '塔西', 
        showOtherName: false, 
        myAvatar: defaultMyAvatar,
        otherAvatar: defaultOtherAvatar,
        messages: [
            { id: 1, type: 'time', content: '星期三 11:17' },
            { id: 2, type: 'call', isMe: true, content: '通话时长 00:43' },
            { id: 3, type: 'time', content: '星期三 16:11' },
            { id: 4, type: 'text', isMe: false, content: '苹果字体分版本的' },
            { id: 5, type: 'text', isMe: false, content: '要指定字体，粗一点细一点没用的' }
        ]
    };

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                // 深拷贝一份默认数据作为初始状态
                ...JSON.parse(JSON.stringify(defaultState)),
                dragIndex: null,
                dragOverIndex: null
            }
        },
        mounted() {
            // 页面加载时读取本地存储
            this.loadState();
        },
        watch: {
            // 监听数据变化，实现自动保存功能
            isDarkMode: 'saveState',
            statusBarTime: 'saveState',
            returnAppText: 'saveState',
            chatName: 'saveState',
            unreadCount: 'saveState',
            otherName: 'saveState',
            showOtherName: 'saveState',
            myAvatar: 'saveState',
            otherAvatar: 'saveState',
            messages: {
                handler: 'saveState',
                deep: true
            }
        },
        methods: {
            // 保存状态到 localStorage
            saveState() {
                try {
                    const stateToSave = {
                        isDarkMode: this.isDarkMode,
                        statusBarTime: this.statusBarTime,
                        returnAppText: this.returnAppText,
                        chatName: this.chatName,
                        unreadCount: this.unreadCount,
                        otherName: this.otherName,
                        showOtherName: this.showOtherName,
                        myAvatar: this.myAvatar,
                        otherAvatar: this.otherAvatar,
                        messages: this.messages
                    };
                    localStorage.setItem('wechat_editor_state_v18', JSON.stringify(stateToSave));
                } catch (e) {
                    console.error('保存状态失败。', e);
                    if (e.name === 'QuotaExceededError') {
                        alert('警告：插入的图片过大，超出了浏览器的本地存储限制（通常为5MB）。本次修改的数据将无法在下次刷新时保留，请尽量压缩图片后再上传。');
                    }
                }
            },
            // 从 localStorage 读取状态
            loadState() {
                const savedState = localStorage.getItem('wechat_editor_state_v18');
                if (savedState) {
                    try {
                        const parsedState = JSON.parse(savedState);
                        Object.assign(this, parsedState);
                    } catch (e) {
                        console.error('加载历史数据失败', e);
                    }
                }
            },
            // 一键重置数据
            resetState() {
                if (confirm('确定要清空所有自定义数据并恢复到默认状态吗？')) {
                    const freshState = JSON.parse(JSON.stringify(defaultState));
                    Object.assign(this, freshState);
                    localStorage.removeItem('wechat_editor_state_v18');
                }
            },
            getTextClass(msg) {
                const theme = this.isDarkMode ? 'dark' : 'light';
                const side = msg.isMe ? 'right' : 'left';
                const shadow = (!this.isDarkMode) ? 'wechat-soft-shadow' : '';
                return `wechat-${theme}-${side} bubble-${side}-${theme} ${shadow}`;
            },
            getTransferClass(msg) {
                const theme = this.isDarkMode ? 'dark' : 'light';
                const side = msg.isMe ? 'right' : 'left';
                const state = msg.status === 'pending' ? 'pending' : 'accepted';
                const shadow = (!this.isDarkMode) ? 'wechat-soft-shadow' : '';
                return `transfer-${state}-${theme} bubble-${side}-orange-${state}-${theme} ${shadow}`;
            },
            getVoiceWidth(sec) {
                if(!sec || sec < 1) sec = 1;
                return Math.min(70 + (sec * 4), 220) + 'px';
            },
            addMessage(type) {
                const baseMsg = { id: Date.now(), type: type, isMe: true };
                if (type === 'text') baseMsg.content = '输入内容...';
                else if (type === 'image') baseMsg.imageUrl = defaultImage;
                else if (type === 'voice') { baseMsg.duration = 10; baseMsg.status = 'unread'; baseMsg.convertedText = '转换后的文字...'; }
                else if (type === 'transfer') { baseMsg.amount = '¥1.00'; baseMsg.title = '你发起了一笔转账'; baseMsg.bottomText = '转账'; baseMsg.status = 'pending'; }
                else if (type === 'call') baseMsg.content = '通话时长 12:34';
                else if (type === 'time') {
                    const now = new Date();
                    baseMsg.content = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                } else if (type === 'nudge') baseMsg.content = '我拍了拍 "对方"';

                this.messages.push(baseMsg);
                this.scrollToBottom();
            },
            removeMessage(index) { this.messages.splice(index, 1); },
            onDragStart(event, index) {
                this.dragIndex = index;
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', index);
            },
            onDragEnter(index) { if(this.dragIndex !== index) this.dragOverIndex = index; },
            onDragOver(event, index) { event.preventDefault(); },
            onDragLeave(index) { if(this.dragOverIndex === index) this.dragOverIndex = null; },
            onDrop(event, index) {
                if (this.dragIndex !== null && this.dragIndex !== index) {
                    const draggedItem = this.messages.splice(this.dragIndex, 1)[0];
                    this.messages.splice(index, 0, draggedItem);
                }
                this.dragIndex = null; this.dragOverIndex = null;
            },
            onDragEnd() { this.dragIndex = null; this.dragOverIndex = null; },
            onAvatarChange(event, type) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => { type === 'me' ? this.myAvatar = e.target.result : this.otherAvatar = e.target.result; };
                    reader.readAsDataURL(file);
                }
            },
            onMsgImageUpload(event, msg) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => { msg.imageUrl = e.target.result; };
                    reader.readAsDataURL(file);
                }
            },
            scrollToBottom() {
                setTimeout(() => {
                    const preview = document.querySelector('#wechat-preview > div:nth-child(3)');
                    if (preview) preview.scrollTop = preview.scrollHeight;
                    const editPanel = document.querySelector('#edit-panel-scroll');
                    if (editPanel) editPanel.scrollTop = editPanel.scrollHeight;
                }, 50);
            },
            generateImage() {
                const node = document.getElementById('wechat-preview');
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '正在生成超清截图...';
                
                const bgColor = this.isDarkMode ? '#111111' : '#ededed';
                
                htmlToImage.toPng(node, {
                    pixelRatio: 3, 
                    backgroundColor: bgColor,
                    style: { transform: 'scale(1)', transformOrigin: 'top left' }
                }).then(function (dataUrl) {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `微信截图_${new Date().getTime()}.png`;
                    a.click();
                }).catch(function (error) {
                    console.error('导出失败!', error);
                    alert('截图生成失败，请重试');
                }).finally(function () {
                    btn.innerHTML = originalText;
                });
            }
        }
    }).mount('#app');
</script>

</body>
